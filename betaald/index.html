<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bedankt voor je betaling — Camping Cosmopolite</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:linear-gradient(160deg,#0D4D33,#1B8A5B);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:24px;padding:40px 28px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .icon{font-size:64px;margin-bottom:16px}
  h1{font-size:24px;color:#0D4D33;margin-bottom:10px}
  p{font-size:15px;color:#444;line-height:1.6;margin-bottom:8px}
  .sub{font-size:13px;color:#888;margin-top:20px}
  .logo{font-size:13px;font-weight:800;color:#1B8A5B;margin-top:24px}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Bedankt voor je betaling!</h1>
    <p>We hebben je betaling goed ontvangen. Je reservatie is bevestigd.</p>
    <p>Je ontvangt geen verdere actie — alles is in orde. Tot binnenkort op de camping! 🏕️</p>
    <div class="sub">Je mag dit venster sluiten.</div>
    <div class="logo">🏕️ Camping Cosmopolite</div>
  </div>
</body>
</html>
