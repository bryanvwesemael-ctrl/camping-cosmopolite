name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run unit/integration tests (pricing single source of truth)
        run: npm test
